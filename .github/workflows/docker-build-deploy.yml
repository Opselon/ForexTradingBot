name: Test, Build, Secure, and Deploy Application

on:
  schedule:
    - cron: '45 2 * * *' # Example: 2:45 AM daily

  push:
    branches:
      - 'master'
      - 'ForexSignal-Performance' 
    tags:
      - 'v*.*.*' 

  pull_request:
    branches:
      - 'master'
      - 'ForexSignal-Performance'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOTNET_VERSION: '9.0.x'
  SOLUTION_FILE_PATH: ForexTradingBot.sln 
  TEST_RESULTS_DIR: ./test-results 
  COVERAGE_REPORTS_DIR: ./coverage-reports 
  RUNSETTINGS_FILE: .runsettings 

  DOCKER_BUILD_ARGS: |
    ARG_ASPNETCORE_ENVIRONMENT=Production
    ARG_DOTNET_RUNNING_IN_CONTAINER=true
    ARG_TELEGRAM_PANEL_USE_WEBHOOK=false
    ARG_TELEGRAM_PANEL_POLLING_INTERVAL=0
    ARG_TELEGRAM_PANEL_ADMIN_USER_IDS_0=5094837833
    ARG_TELEGRAM_PANEL_ENABLE_DEBUG_MODE=true
    ARG_CRYPTOPAY_BASE_URL=https://testnet-pay.crypt.bot/api/
    ARG_CRYPTOPAY_IS_TESTNET=true

jobs:
  test:
    name: "🧪 Run Unit & Integration Tests"
    runs-on: ubuntu-latest
    outputs:
      coverage_percentage: ${{ steps.check_coverage.outputs.coveragePercentage }}
      test_run_successful: ${{ steps.final_test_check.outputs.success }}

    steps:
      - name: "⬇️ Checkout Repository"
        uses: actions/checkout@v4

      - name: "⚙️ Setup .NET SDK ${{ env.DOTNET_VERSION }}"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "📦 Cache NuGet Packages"
        id: cache-nuget
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-dotnet${{ env.DOTNET_VERSION }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-dotnet${{ env.DOTNET_VERSION }}-
            ${{ runner.os }}-nuget-

      - name: "🛠️ Restore Dependencies"
        run: dotnet restore "${{ env.SOLUTION_FILE_PATH }}"

      - name: "🏗️ Build Solution (Release)"
        run: dotnet build "${{ env.SOLUTION_FILE_PATH }}" --no-restore --configuration Release

      - name: "🗂️ Create Test Artifact Directories"
        run: |
          mkdir -p "${{ env.TEST_RESULTS_DIR }}/application"
          mkdir -p "${{ env.TEST_RESULTS_DIR }}/integration"
          mkdir -p "${{ env.COVERAGE_REPORTS_DIR }}/raw" 
          mkdir -p "${{ env.COVERAGE_REPORTS_DIR }}/final-report"

      - name: "🧪 Run Application Tests"
        id: app_tests
        run: |
          APPLICATION_TEST_PROJECT_PATH=$(find . -path "*/Tests.Application.csproj" -print -quit || echo "")
          if [ -z "$APPLICATION_TEST_PROJECT_PATH" ]; then
            # اصلاح شده: حذف ارجاع به LINENO
            echo "::warning file=${{ github.workflow }}::Application test project not found. Skipping."
            echo "APPLICATION_TESTS_RESULT=skipped" >> $GITHUB_ENV
          else
            echo "Running Application Tests: $APPLICATION_TEST_PROJECT_PATH"
            if dotnet test "$APPLICATION_TEST_PROJECT_PATH" \
              --configuration Release \
              --no-build \
              --logger "trx;LogFileName=application-tests.trx" \
              --results-directory "${{ env.TEST_RESULTS_DIR }}/application" \
              --collect:"XPlat Code Coverage" \
              ${{ env.RUNSETTINGS_FILE_EXISTS && format('--settings {0}', env.RUNSETTINGS_FILE) || '' }} \
              ${{ env.RUNSETTINGS_FILE_EXISTS && 'DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura' || ''}} \
              ${{ env.RUNSETTINGS_FILE_EXISTS && format('DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.CoverageFileName=app.cobertura.xml') || '' }} \
              ${{ env.RUNSETTINGS_FILE_EXISTS && format('DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.OutputDirectory={0}/raw', env.COVERAGE_REPORTS_DIR) || ''}} \
              --blame-hang-timeout 120s; then
              echo "APPLICATION_TESTS_RESULT=success" >> $GITHUB_ENV
            else
              # اصلاح شده: حذف ارجاع به LINENO
              echo "::error file=${{ github.workflow }}::Application tests failed."
              echo "APPLICATION_TESTS_RESULT=failure" >> $GITHUB_ENV
            fi
          fi
        env:
          RUNSETTINGS_FILE_EXISTS: ${{ hashFiles(env.RUNSETTINGS_FILE) != '' }}


      - name: "🔩 Run Integration Tests"
        id: int_tests
        run: |
          INTEGRATION_TEST_PROJECT_PATH=$(find . -path "*/Integration.Tests.csproj" -print -quit || echo "")
          if [ -z "$INTEGRATION_TEST_PROJECT_PATH" ]; then
            # اصلاح شده: حذف ارجاع به LINENO
            echo "::warning file=${{ github.workflow }}::Integration test project not found. Skipping."
            echo "INTEGRATION_TESTS_RESULT=skipped" >> $GITHUB_ENV
          else
            echo "Running Integration Tests: $INTEGRATION_TEST_PROJECT_PATH"
            if dotnet test "$INTEGRATION_TEST_PROJECT_PATH" \
              --configuration Release \
              --no-build \
              --logger "trx;LogFileName=integration-tests.trx" \
              --results-directory "${{ env.TEST_RESULTS_DIR }}/integration" \
              --collect:"XPlat Code Coverage" \
              ${{ env.RUNSETTINGS_FILE_EXISTS && format('--settings {0}', env.RUNSETTINGS_FILE) || '' }} \
              ${{ env.RUNSETTINGS_FILE_EXISTS && 'DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura' || ''}} \
              ${{ env.RUNSETTINGS_FILE_EXISTS && format('DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.CoverageFileName=int.cobertura.xml') || '' }} \
              ${{ env.RUNSETTINGS_FILE_EXISTS && format('DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.OutputDirectory={0}/raw', env.COVERAGE_REPORTS_DIR) || ''}} \
              --blame-hang-timeout 240s; then
              echo "INTEGRATION_TESTS_RESULT=success" >> $GITHUB_ENV
            else
              # اصلاح شده: حذف ارجاع به LINENO
              echo "::error file=${{ github.workflow }}::Integration tests failed."
              echo "INTEGRATION_TESTS_RESULT=failure" >> $GITHUB_ENV
            fi
          fi
        env:
          RUNSETTINGS_FILE_EXISTS: ${{ hashFiles(env.RUNSETTINGS_FILE) != '' }}

      - name: "📄 Generate Combined Coverage Report"
        if: env.RUNSETTINGS_FILE_EXISTS == 'true' 
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.2.0 || true
          
          COBERTURA_FILES_PATTERN="${{ env.COVERAGE_REPORTS_DIR }}/raw/*.cobertura.xml"
          if ! ls $COBERTURA_FILES_PATTERN 1> /dev/null 2>&1; then
            # اصلاح شده: حذف ارجاع به LINENO
            echo "::warning file=${{ github.workflow }}::No .cobertura.xml files found. Skipping coverage report generation."
            echo "No Cobertura coverage data available." > "${{ env.COVERAGE_REPORTS_DIR }}/final-report/Summary.txt"
          else
            echo "Generating combined coverage report from files matching: $COBERTURA_FILES_PATTERN"
            reportgenerator \
              "-reports:$COBERTURA_FILES_PATTERN" \
              "-targetdir:${{ env.COVERAGE_REPORTS_DIR }}/final-report" \
              "-reporttypes:HtmlInline_AzurePipelines;Cobertura;TextSummary" \
              "-assemblyfilters:+${{ env.SOLUTION_FILE_PATH }};-*.Tests" 
            cat "${{ env.COVERAGE_REPORTS_DIR }}/final-report/Summary.txt" || echo "Summary.txt not found."
          fi

      - name: "📊 Check Test Coverage & Set Output"
        id: check_coverage
        run: |
          COVERAGE_PERCENTAGE=0
          SUMMARY_FILE="${{ env.COVERAGE_REPORTS_DIR }}/final-report/Summary.txt"
          if [ -f "$SUMMARY_FILE" ]; then
            LINE_COVERAGE=$(grep -i 'Line coverage' "$SUMMARY_FILE" | sed -n 's/.*Line coverage:[^0-9]*\([0-9.]\+\)%/\1/p')
            if [ -n "$LINE_COVERAGE" ]; then
              COVERAGE_PERCENTAGE=$LINE_COVERAGE
            fi
          fi
          echo "Current Line Coverage: $COVERAGE_PERCENTAGE%"
          echo "coveragePercentage=$COVERAGE_PERCENTAGE" >> "$GITHUB_OUTPUT"

      - name: "📤 Upload Test & Coverage Artifacts"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-and-coverage-artifacts-${{ github.run_id }}
          path: |
            ${{ env.TEST_RESULTS_DIR }}/**
            ${{ env.COVERAGE_REPORTS_DIR }}/**
          retention-days: 7

      - name: "🏁 Final Test Result Check"
        id: final_test_check
        run: |
          if [[ "${{ env.APPLICATION_TESTS_RESULT }}" == "failure" || "${{ env.INTEGRATION_TESTS_RESULT }}" == "failure" ]]; then
            # اصلاح شده: حذف ارجاع به LINENO
            echo "::error file=${{ github.workflow }}::Test job failed due to test failures."
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "Test job completed. Status: AppTests=${{ env.APPLICATION_TESTS_RESULT:-not_run }}, IntTests=${{ env.INTEGRATION_TESTS_RESULT:-not_run }}"
            echo "success=true" >> "$GITHUB_OUTPUT"
          fi

  #------------------------------------------------------------------------------------
  # JOB 2: Build - Build, sign, and push Docker image
  #------------------------------------------------------------------------------------
  build:
    name: "🏗️ Build, Sign & Push Docker Image"
    needs: test
    if: ${{ needs.test.outputs.test_run_successful == 'true' && github.event_name != 'pull_request' }} 
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write 

    outputs:
      image_digest: ${{ steps.build-and-push.outputs.digest }}
      primary_image_tag: ${{ steps.meta.outputs.version }} 

    steps:
      - name: "⬇️ Checkout Repository"
        uses: actions/checkout@v4

      - name: "🛡️ Install Cosign (for image signing)"
        uses: sigstore/cosign-installer@v3.5.0
        with:
          cosign-release: 'v2.2.4'

      - name: "🔧 Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3.3.0

      - name: "🔑 Log in to GitHub Container Registry (GHCR)"
        uses: docker/login-action@v3.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "ℹ️ Extract Docker Metadata (Tags and Labels)"
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule,pattern={{date 'YYYYMMDDHHmmss'}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix= 
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}

      - name: "🏭 Build and Push Docker Image"
        id: build-and-push
        uses: docker/build-push-action@v5.3.0
        with:
          context: .
          push: true 
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          build-args: ${{ env.DOCKER_BUILD_ARGS }}

      - name: "✍️ Sign the Published Docker Image (Sigstore)"
        if: steps.build-and-push.outputs.digest 
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_TO_SIGN: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-and-push.outputs.digest }}"
        run: |
          echo "Signing image: $IMAGE_TO_SIGN"
          cosign sign --yes "$IMAGE_TO_SIGN"

  #------------------------------------------------------------------------------------
  # JOB 3: Deploy - Deploy application to the server
  #------------------------------------------------------------------------------------
  deploy:
    name: "🚀 Deploy Application to Production"
    needs: build 
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/ForexSignal-Performance')
    runs-on: ubuntu-latest
    environment: production 

    steps:
      - name: "🔑 Setup SSH Agent (for server access)"
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: "🚀 Deploy to Server via SSH"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          timeout: 60s
          command_timeout: 15m 
          env: |
            SECRET_DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SECRET_TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            SECRET_TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
            SECRET_TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
            SECRET_LOG_MONITOR_TELEGRAM_CHANNEL_ID=${{ secrets.LOG_MONITOR_TELEGRAM_CHANNEL_ID }}
            SECRET_CRYPTOPAY_API_TOKEN=${{ secrets.CRYPTOPAY_API_TOKEN }}
            SECRET_CRYPTOPAY_API_KEY=${{ secrets.CRYPTOPAY_API_KEY }}
            SECRET_CRYPTOPAY_WEBHOOK_SECRET=${{ secrets.CRYPTOPAY_WEBHOOK_SECRET }}
            GIT_BRANCH_NAME=${{ github.ref_name }}
            DEPLOY_IMAGE_TAG=${{ needs.build.outputs.primary_image_tag }}
            REGISTRY_GHCR=${{ env.REGISTRY }} 
            IMAGE_NAME_BASE=${{ env.IMAGE_NAME }}

          script: |
            set -euo pipefail 

            DEPLOY_TARGET_DIR="/var/lib/forex-trading-bot/ForexTradingBot"
            DEPLOY_SCRIPT_NAME="deploy.sh" 
            DEPLOY_SCRIPT_FULL_PATH="$DEPLOY_TARGET_DIR/$DEPLOY_SCRIPT_NAME"

            echo ">>> Navigating to deployment directory: $DEPLOY_TARGET_DIR"
            mkdir -p "$DEPLOY_TARGET_DIR"
            cd "$DEPLOY_TARGET_DIR"

            echo ">>> Updating deployment script and configurations from Git branch: $GIT_BRANCH_NAME"
            if [ ! -d ".git" ]; then
              echo "Initializing Git repository in $DEPLOY_TARGET_DIR..."
              git init
              # git remote add origin ${{ github.server_url }}/${{ github.repository }}.git # Adjust if needed
            fi
            
            git fetch origin "$GIT_BRANCH_NAME" --depth 1 
            git reset --hard "origin/$GIT_BRANCH_NAME"
            # git clean -fdx 

            echo ">>> Verifying deployment script: $DEPLOY_SCRIPT_FULL_PATH"
            if [ ! -f "$DEPLOY_SCRIPT_FULL_PATH" ]; then
                # اصلاح شده: حذف ارجاع به LINENO
                echo "::error file=${{ github.workflow }}::Deploy script '$DEPLOY_SCRIPT_FULL_PATH' not found in $DEPLOY_TARGET_DIR."
                exit 1
            fi
            chmod +x "$DEPLOY_SCRIPT_FULL_PATH"

            echo ">>> Executing deployment script: $DEPLOY_SCRIPT_FULL_PATH"
            "$DEPLOY_SCRIPT_FULL_PATH"