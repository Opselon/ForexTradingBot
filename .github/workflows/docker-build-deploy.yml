name: Docker Build and Deploy

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  schedule:
    - cron: '16 20 * * *'
  push:
    branches: [ "master", "ForexSignal-Performance" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "master", "ForexSignal-Performance" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  # Non-sensitive build arguments
  BUILD_ARGS: |
    ASPNETCORE_ENVIRONMENT=Production
    DOTNET_RUNNING_IN_CONTAINER=true
    TELEGRAM_PANEL__USE_WEBHOOK=false
    TELEGRAM_PANEL__POLLING_INTERVAL=0
    TELEGRAM_PANEL__ADMIN_USER_IDS__0=5094837833
    TELEGRAM_PANEL__ENABLE_DEBUG_MODE=true
    CRYPTOPAY__BASE_URL=https://testnet-pay.crypt.bot/api/
    CRYPTOPAY__IS_TESTNET=true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ForexTradingBot.sln

      - name: Build
        run: dotnet build ForexTradingBot.sln --no-restore

      - name: Run Unit Tests with Coverage
        run: |
          dotnet test Tests.Unit/Tests.Unit.csproj \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/unit

      - name: Run Integration Tests with Coverage
        run: |
          dotnet test Tests.Integration/Tests.Integration.csproj \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/integration

      - name: Generate Coverage Report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:./coverage/**/coverage.cobertura.xml \
            -targetdir:./coverage/report \
            -reporttypes:HtmlInline_AzurePipelines;Cobertura

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/TestResults/
            **/coverage/
          retention-days: 7

      - name: Publish Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage/report
          retention-days: 7

      - name: Check Test Coverage
        run: |
          coverage=$(grep -o 'line-rate="[0-9.]*"' ./coverage/report/Cobertura.xml | grep -o '[0-9.]*')
          if (( $(echo "$coverage < 0.8" | bc -l) )); then
            echo "Test coverage is below 80%: $coverage"
            exit 1
          fi
          echo "Test coverage is good: $coverage"

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 #v3.5.0
        with:
          cosign-release: 'v2.2.4'

      # Set up BuildKit Docker container builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Login against a Docker registry except on PR
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      # Build and push Docker image with Buildx (don't push on PR)
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max
          build-args: ${{ env.BUILD_ARGS }}

      # Sign the resulting Docker image digest except on PRs
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      # Setup SSH Agent for deployment
      - name: Setup SSH Agent
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/ForexSignal-Performance')
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # Deploy to server
      - name: Deploy to server
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/ForexSignal-Performance')
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to application directory
            cd /var/lib/forex-trading-bot/ForexTradingBot
            
            # Pull latest changes
            git pull origin ${{ github.ref_name }}
            
            # Stop and remove existing containers
            docker compose down
            
            # Pull latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            # Create Docker secrets directly
            echo "${{ secrets.DB_PASSWORD }}" | docker secret create db_password -
            echo "${{ secrets.TELEGRAM_BOT_TOKEN }}" | docker secret create telegram_bot_token -
            echo "${{ secrets.TELEGRAM_API_ID }}" | docker secret create telegram_api_id -
            echo "${{ secrets.TELEGRAM_API_HASH }}" | docker secret create telegram_api_hash -
            echo "${{ secrets.CRYPTOPAY_API_TOKEN }}" | docker secret create cryptopay_api_token -
            echo "${{ secrets.CRYPTOPAY_API_KEY }}" | docker secret create cryptopay_api_key -
            echo "${{ secrets.CRYPTOPAY_WEBHOOK_SECRET }}" | docker secret create cryptopay_webhook_secret -
            echo "${{ secrets.LOG_MONITOR_TELEGRAM_CHANNEL_ID }}" | docker secret create telegram_channel_id -
            
            # Wait for database to be ready
            echo "Waiting for database to be ready..."
            for i in {1..30}; do
              if docker compose exec db pg_isready -U forexuser -d forextrading; then
                echo "Database is ready!"
                break
              fi
              echo "Waiting for database... attempt $i"
              sleep 2
            done
            
            # Start services with secrets
            docker compose --env-file /dev/null up -d
            
            # Wait for services to start
            echo "Waiting for services to start..."
            sleep 10
            
            # Check container status
            echo "Checking container status..."
            docker ps -a
            
            # Start log monitoring for each service
            echo "Starting log monitoring..."
            docker compose exec -d webapi ./docker_log_monitor webapi
            docker compose exec -d backgroundtasks ./docker_log_monitor backgroundtasks
            docker compose exec -d telegrampanel ./docker_log_monitor telegrampanel
            
            # Show logs for all services
            echo "Showing logs for all services..."
            docker compose logs --tail 100
            
            # Check specific service logs
            echo "Checking WebAPI logs..."
            docker compose logs webapi --tail 100
            
            echo "Checking BackgroundTasks logs..."
            docker compose logs backgroundtasks --tail 100
            
            echo "Checking TelegramPanel logs..."
            docker compose logs telegrampanel --tail 100
            
            # Verify log monitoring is running
            echo "Verifying log monitoring..."
            docker ps | grep docker_log_monitor
            
            # Clean up secrets after deployment
            docker secret rm db_password telegram_bot_token telegram_api_id telegram_api_hash cryptopay_api_token cryptopay_api_key cryptopay_webhook_secret telegram_channel_id 