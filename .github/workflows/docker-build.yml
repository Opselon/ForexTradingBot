name: Docker Build and Deploy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create secrets directory
        run: mkdir -p secrets

      - name: Create secret files
        run: |
          echo "${{ secrets.DB_PASSWORD }}" > secrets/db_password.txt
          echo "${{ secrets.TELEGRAM_BOT_TOKEN }}" > secrets/telegram_bot_token.txt
          echo "${{ secrets.TELEGRAM_API_ID }}" > secrets/telegram_api_id.txt
          echo "${{ secrets.TELEGRAM_API_HASH }}" > secrets/telegram_api_hash.txt
          echo "${{ secrets.CRYPTOPAY_API_TOKEN }}" > secrets/cryptopay_api_token.txt
          echo "${{ secrets.CRYPTOPAY_API_KEY }}" > secrets/cryptopay_api_key.txt
          echo "${{ secrets.CRYPTOPAY_WEBHOOK_SECRET }}" > secrets/cryptopay_webhook_secret.txt

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/lib/forex-trading-bot/ForexTradingBot
            mkdir -p secrets
            echo "${{ secrets.DB_PASSWORD }}" > secrets/db_password.txt
            echo "${{ secrets.TELEGRAM_BOT_TOKEN }}" > secrets/telegram_bot_token.txt
            echo "${{ secrets.TELEGRAM_API_ID }}" > secrets/telegram_api_id.txt
            echo "${{ secrets.TELEGRAM_API_HASH }}" > secrets/telegram_api_hash.txt
            echo "${{ secrets.CRYPTOPAY_API_TOKEN }}" > secrets/cryptopay_api_token.txt
            echo "${{ secrets.CRYPTOPAY_API_KEY }}" > secrets/cryptopay_api_key.txt
            echo "${{ secrets.CRYPTOPAY_WEBHOOK_SECRET }}" > secrets/cryptopay_webhook_secret.txt
            docker-compose pull
            docker-compose up -d 