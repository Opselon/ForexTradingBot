version: '3.8'

services:
  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=myappdb;Username=postgres;Password=${DB_PASSWORD}
      - ConnectionStrings__HangfireConnection=Host=db;Database=hangfire;Username=postgres;Password=${DB_PASSWORD}
      - TelegramBot__Token=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_SESSION_PATH=/app/telegram-sessions
    volumes:
      - telegram-sessions:/app/telegram-sessions
      - data-protection:/app/data-protection
    depends_on:
      - db
      - redis
    networks:
      - forex-network
    working_dir: /app/webapi

  backgroundtasks:
    build:
      context: .
      dockerfile: Dockerfile
    command: dotnet BackgroundTasks.dll
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=myappdb;Username=postgres;Password=${DB_PASSWORD}
      - ConnectionStrings__HangfireConnection=Host=db;Database=hangfire;Username=postgres;Password=${DB_PASSWORD}
      - TelegramBot__Token=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_SESSION_PATH=/app/telegram-sessions
    volumes:
      - telegram-sessions:/app/telegram-sessions
      - data-protection:/app/data-protection
    depends_on:
      - db
      - redis
    networks:
      - forex-network
    working_dir: /app/tasks

  telegrampanel:
    build:
      context: .
      dockerfile: Dockerfile
    command: dotnet TelegramPanel.dll
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=myappdb;Username=postgres;Password=${DB_PASSWORD}
      - TelegramBot__Token=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}
      - TELEGRAM_SESSION_PATH=/app/telegram-sessions
    volumes:
      - telegram-sessions:/app/telegram-sessions
      - data-protection:/app/data-protection
    depends_on:
      - db
      - redis
    networks:
      - forex-network
    working_dir: /app/telegrampanel

  logmonitor:
    build:
      context: .
      dockerfile: Dockerfile
    command: ./docker_log_monitor webapi
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - forex-network
    depends_on:
      - webapi

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_MULTIPLE_DATABASES=myappdb,hangfire
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - forex-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - forex-network

networks:
  forex-network:
    driver: bridge

volumes:
  postgres-data:
  telegram-sessions:
  data-protection: 