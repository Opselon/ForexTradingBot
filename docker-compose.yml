version: '3.8'

# Variables are read from .env or environment
# IMAGE_TAG=${IMAGE_TAG:-latest} # Can be set in .env

services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./.env.production
    environment:
      - POSTGRES_DB=forextrading
      - POSTGRES_USER=forexuser
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432" # Restricted to localhost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forexuser -d forextrading"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forex-network
    secrets:
      - db_password

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379" # Restricted to localhost
    volumes:
      - redis_data:/data
    networks:
      - forex-network

  webapi:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-capsizer/forextradingbot}:${IMAGE_TAG:-latest}
    env_file:
      - ./.env.production
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=db;Database=forextrading;Username=forexuser;PasswordFile=/run/secrets/db_password
      - TELEGRAM_BOT__TOKEN_FILE=/run/secrets/telegram_bot_token
      - TELEGRAM_BOT__API_ID_FILE=/run/secrets/telegram_api_id
      - TELEGRAM_BOT__API_HASH_FILE=/run/secrets/telegram_api_hash
      - CRYPTOPAY__API_TOKEN_FILE=/run/secrets/cryptopay_api_token
      - CRYPTOPAY__API_KEY_FILE=/run/secrets/cryptopay_api_key
      - CRYPTOPAY__WEBHOOK_SECRET_FILE=/run/secrets/cryptopay_webhook_secret
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network
    secrets:
      - db_password
      - telegram_bot_token
      - telegram_api_id
      - telegram_api_hash
      - cryptopay_api_token
      - cryptopay_api_key
      - cryptopay_webhook_secret

  backgroundtasks:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-capsizer/forextradingbot}:${IMAGE_TAG:-latest}
    env_file:
      - ./.env.production
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=db;Database=forextrading;Username=forexuser;PasswordFile=/run/secrets/db_password
      - TELEGRAM_BOT__TOKEN_FILE=/run/secrets/telegram_bot_token
      - TELEGRAM_BOT__API_ID_FILE=/run/secrets/telegram_api_id
      - TELEGRAM_BOT__API_HASH_FILE=/run/secrets/telegram_api_hash
      - CRYPTOPAY__API_TOKEN_FILE=/run/secrets/cryptopay_api_token
      - CRYPTOPAY__API_KEY_FILE=/run/secrets/cryptopay_api_key
      - CRYPTOPAY__WEBHOOK_SECRET_FILE=/run/secrets/cryptopay_webhook_secret
    command: dotnet tasks/BackgroundTasks.dll
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network
    secrets:
      - db_password
      - telegram_bot_token
      - telegram_api_id
      - telegram_api_hash
      - cryptopay_api_token
      - cryptopay_api_key
      - cryptopay_webhook_secret

  telegrampanel:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-capsizer/forextradingbot}:${IMAGE_TAG:-latest}
    env_file:
      - ./.env.production
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=db;Database=forextrading;Username=forexuser;PasswordFile=/run/secrets/db_password
      - TELEGRAM_BOT__TOKEN_FILE=/run/secrets/telegram_bot_token
      - TELEGRAM_BOT__API_ID_FILE=/run/secrets/telegram_api_id
      - TELEGRAM_BOT__API_HASH_FILE=/run/secrets/telegram_api_hash
      - CRYPTOPAY__API_TOKEN_FILE=/run/secrets/cryptopay_api_token
      - CRYPTOPAY__API_KEY_FILE=/run/secrets/cryptopay_api_key
      - CRYPTOPAY__WEBHOOK_SECRET_FILE=/run/secrets/cryptopay_webhook_secret
    command: dotnet telegrampanel/TelegramPanel.dll
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network
    secrets:
      - db_password
      - telegram_bot_token
      - telegram_api_id
      - telegram_api_hash
      - cryptopay_api_token
      - cryptopay_api_key
      - cryptopay_webhook_secret

  log-monitor:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-capsizer/forextradingbot}:${IMAGE_TAG:-latest}
    env_file:
      - ./.env.production
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - TELEGRAM_BOT__TOKEN_FILE=/run/secrets/telegram_bot_token
      - TELEGRAM_CHANNEL_ID_FILE=/run/secrets/telegram_channel_id
    depends_on:
      - webapi
      - backgroundtasks
      - telegrampanel
    networks:
      - forex-network
    secrets:
      - telegram_bot_token
      - telegram_channel_id

volumes:
  postgres_data:
  redis_data:

networks:
  forex-network:
    driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password.txt
  telegram_bot_token:
    file: ./secrets/telegram_bot_token.txt
  telegram_api_id:
    file: ./secrets/telegram_api_id.txt
  telegram_api_hash:
    file: ./secrets/telegram_api_hash.txt
  cryptopay_api_token:
    file: ./secrets/cryptopay_api_token.txt
  cryptopay_api_key:
    file: ./secrets/cryptopay_api_key.txt
  cryptopay_webhook_secret:
    file: ./secrets/cryptopay_webhook_secret.txt
  telegram_channel_id:
    file: ./secrets/telegram_channel_id.txt 
