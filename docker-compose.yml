# REMOVED: version: '3.8'

# Variables are read from .env.production file by docker compose
# (Generated by deploy.sh)

services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-forexuser} -d ${DB_NAME:-forextrading}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forex-network

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - forex-network

  webapi:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}:${IMAGE_TAG} # GITHUB_REPOSITORY will be lowercase
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING_APP}
      - TELEGRAM_BOT__TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT__API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_BOT__API_HASH=${TELEGRAM_API_HASH}
      # REMOVED CRYPTOPAY_*
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network

  backgroundtasks:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}:${IMAGE_TAG}
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING_APP}
      - TELEGRAM_BOT__TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT__API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_BOT__API_HASH=${TELEGRAM_API_HASH}
      # REMOVED CRYPTOPAY_*
    command: dotnet backgroundtasks/BackgroundTasks.dll # Ensure BackgroundTasks.dll is correct
    working_dir: /app/backgroundtasks # Make sure working_dir is correct if command is relative
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network

  telegrampanel:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}:${IMAGE_TAG}
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING_APP}
      - TELEGRAM_BOT__TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT__API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_BOT__API_HASH=${TELEGRAM_API_HASH}
      # REMOVED CRYPTOPAY_*
    command: dotnet telegrampanel/TelegramPanel.dll # Ensure TelegramPanel.dll is correct
    working_dir: /app/telegrampanel # Make sure working_dir is correct if command is relative
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network

  log-monitor:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}:${IMAGE_TAG}
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - TELEGRAM_BOT__TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${LOG_MONITOR_TELEGRAM_CHANNEL_ID}
    # If LogMonitor is a runnable DLL, add command and working_dir
    # command: dotnet logmonitor/LogMonitor.dll
    # working_dir: /app/logmonitor
    depends_on:
      - webapi
      - backgroundtasks
      - telegrampanel
    networks:
      - forex-network

volumes:
  postgres_data:
  redis_data:

networks:
  forex-network:
    driver: bridge