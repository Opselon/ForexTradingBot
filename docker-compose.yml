version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forextrading
      POSTGRES_USER: forexuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forexuser -d forextrading"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forex-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - forex-network

  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    command: dotnet WebAPI.dll
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=forextrading;Username=forexuser;Password=${DB_PASSWORD}"
      ConnectionStrings__HangfireConnection: "Host=db;Port=5432;Database=forextrading;Username=forexuser;Password=${DB_PASSWORD}"
      TelegramBot__Token: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
    volumes:
      - telegram-sessions:/app/telegram-sessions
      - data-protection:/app/data-protection
      - app-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network

  backgroundtasks:
    build:
      context: .
      dockerfile: Dockerfile
    command: dotnet BackgroundTasks.dll
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=forextrading;Username=forexuser;Password=${DB_PASSWORD}"
      ConnectionStrings__HangfireConnection: "Host=db;Port=5432;Database=forextrading;Username=forexuser;Password=${DB_PASSWORD}"
      TelegramBot__Token: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
    volumes:
      - telegram-sessions:/app/telegram-sessions
      - data-protection:/app/data-protection
      - app-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network

  telegrampanel:
    build:
      context: .
      dockerfile: Dockerfile
    command: dotnet TelegramPanel.dll
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=forextrading;Username=forexuser;Password=${DB_PASSWORD}"
      TelegramBot__Token: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      TELEGRAM_SESSION_PATH: /app/telegram-sessions
    volumes:
      - telegram-sessions:/app/telegram-sessions
      - data-protection:/app/data-protection
      - app-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network

  log-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    command: ./docker_log_monitor webapi
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - webapi
      - backgroundtasks
      - telegrampanel
    networks:
      - forex-network

volumes:
  postgres_data:
  redis_data:
  telegram-sessions:
  data-protection:
  app-logs:

networks:
  forex-network:
    driver: bridge 
