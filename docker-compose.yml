version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forextrading
      POSTGRES_USER: forexuser
      POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forexuser -d forextrading"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forex-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - forex-network

  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_PASSWORD=${{ secrets.DB_PASSWORD }}
      - TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
      - TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
      - TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
      - CRYPTOPAY_API_TOKEN=${{ secrets.CRYPTOPAY_API_TOKEN }}
      - CRYPTOPAY_API_KEY=${{ secrets.CRYPTOPAY_API_KEY }}
      - CRYPTOPAY_WEBHOOK_SECRET=${{ secrets.CRYPTOPAY_WEBHOOK_SECRET }}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - telegram-sessions:/app/telegram-sessions
      - data-protection:/app/data-protection
    networks:
      - forex-network

  backgroundtasks:
    build:
      context: .
      dockerfile: Dockerfile
    command: dotnet BackgroundTasks.dll
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_PASSWORD=${{ secrets.DB_PASSWORD }}
      - TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
      - TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
      - TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
      - CRYPTOPAY_API_TOKEN=${{ secrets.CRYPTOPAY_API_TOKEN }}
      - CRYPTOPAY_API_KEY=${{ secrets.CRYPTOPAY_API_KEY }}
      - CRYPTOPAY_WEBHOOK_SECRET=${{ secrets.CRYPTOPAY_WEBHOOK_SECRET }}
    volumes:
      - telegram-sessions:/app/telegram-sessions
      - data-protection:/app/data-protection
      - app-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network

  telegrampanel:
    build:
      context: .
      dockerfile: Dockerfile
    command: dotnet TelegramPanel.dll
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_PASSWORD=${{ secrets.DB_PASSWORD }}
      - TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
      - TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
      - TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
      - CRYPTOPAY_API_TOKEN=${{ secrets.CRYPTOPAY_API_TOKEN }}
      - CRYPTOPAY_API_KEY=${{ secrets.CRYPTOPAY_API_KEY }}
      - CRYPTOPAY_WEBHOOK_SECRET=${{ secrets.CRYPTOPAY_WEBHOOK_SECRET }}
    volumes:
      - telegram-sessions:/app/telegram-sessions
      - data-protection:/app/data-protection
      - app-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network

  log-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    command: ./docker_log_monitor webapi
    environment:
      - TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - app-logs:/app/logs
    user: root  # Required for Docker socket access
    depends_on:
      - webapi
      - backgroundtasks
      - telegrampanel
    networks:
      - forex-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  telegram-sessions:
  data-protection:
  app-logs:

networks:
  forex-network:
    driver: bridge 
