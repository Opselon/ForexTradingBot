version: '3.8'

# Variables are read from .env.production file by docker compose
# Example variables expected in .env.production:
# DB_NAME=forextrading
# DB_USER=forexuser
# DB_PASSWORD=your_actual_password
# TELEGRAM_BOT_TOKEN=your_token
# ... and so on for all secrets and configurations
# IMAGE_TAG=latest
# REGISTRY=ghcr.io
# GITHUB_REPOSITORY=your_github_org/your_repo_name

services:
  db:
    image: postgres:16-alpine
    container_name: forex-postgres
    # env_file: ./.env.production # docker-compose automatically loads .env in the same directory. Explicitly can be .env.production
    environment:
      # These will be sourced from .env.production (generated by deploy.sh)
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # Allow container networking
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-forexuser} -d ${DB_NAME:-forextrading}"] # Use vars with defaults
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forex-network

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379" # Restricted to localhost
    volumes:
      - redis_data:/data
    networks:
      - forex-network

  webapi:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}:${IMAGE_TAG}
    # env_file: ./.env.production
    environment:
      # Standard ASP.NET Core settings
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      # Application specific settings, sourced from .env.production
      - ConnectionStrings__DefaultConnection=Host=forex-postgres;Port=${DB_PORT:-5432};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - TELEGRAM_BOT__TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT__API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_BOT__API_HASH=${TELEGRAM_API_HASH}
      - CRYPTOPAY__API_TOKEN=${CRYPTOPAY_API_TOKEN}
      - CRYPTOPAY__API_KEY=${CRYPTOPAY_API_KEY}
      - CRYPTOPAY__WEBHOOK_SECRET=${CRYPTOPAY_WEBHOOK_SECRET}
      # Other non-secret env vars can be defined here or in .env.production
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network

  backgroundtasks:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}:${IMAGE_TAG}
    # env_file: ./.env.production
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # ConnectionStrings & secrets sourced from .env.production
      - ConnectionStrings__DefaultConnection=Host=forex-postgres;Port=${DB_PORT:-5432};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - TELEGRAM_BOT__TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT__API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_BOT__API_HASH=${TELEGRAM_API_HASH}
      - CRYPTOPAY__API_TOKEN=${CRYPTOPAY_API_TOKEN}
      - CRYPTOPAY__API_KEY=${CRYPTOPAY_API_KEY}
      - CRYPTOPAY__WEBHOOK_SECRET=${CRYPTOPAY_WEBHOOK_SECRET}
    command: dotnet tasks/BackgroundTasks.dll
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network

  telegrampanel:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}:${IMAGE_TAG}
    # env_file: ./.env.production
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # ConnectionStrings & secrets sourced from .env.production
      - ConnectionStrings__DefaultConnection=Host=forex-postgres;Port=${DB_PORT:-5432};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - TELEGRAM_BOT__TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT__API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_BOT__API_HASH=${TELEGRAM_API_HASH}
      - CRYPTOPAY__API_TOKEN=${CRYPTOPAY_API_TOKEN}
      - CRYPTOPAY__API_KEY=${CRYPTOPAY_API_KEY}
      - CRYPTOPAY__WEBHOOK_SECRET=${CRYPTOPAY_WEBHOOK_SECRET}
    command: dotnet telegrampanel/TelegramPanel.dll
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - forex-network

  log-monitor:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}:${IMAGE_TAG}
    # env_file: ./.env.production
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Secrets sourced from .env.production
      - TELEGRAM_BOT__TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${LOG_MONITOR_TELEGRAM_CHANNEL_ID} # Note: Populated by deploy.sh as LOG_MONITOR_TELEGRAM_CHANNEL_ID
    depends_on:
      - webapi
      - backgroundtasks
      - telegrampanel
    networks:
      - forex-network

volumes:
  postgres_data:
  redis_data:

networks:
  forex-network:
    driver: bridge

# Top-level 'secrets:' block is removed as we are not using Docker file-based secrets.
# All secrets are now passed as environment variables from .env.production.